<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Texas DFPS CBC Region Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: #fff;
  }

  #skip-link {
    position: absolute; top: -999px; left: -999px;
    background: #333f48; color: #fff;
    padding: 8px 14px; font-size: 14px;
    border-radius: 4px; z-index: 100;
    text-decoration: none;
  }
  #skip-link:focus { top: 8px; left: 8px; }

  #search-wrap {
    margin-bottom: 10px;
    display: flex; flex-wrap: wrap;
    align-items: center; gap: 8px;
  }
  #search-wrap label {
    font-size: 14px; font-weight: 600; color: #333f48;
  }
  #county-search {
    font-size: 14px; padding: 6px 10px;
    border: 2px solid #aaa; border-radius: 6px;
    outline: none; width: 220px; max-width: 100%; color: #333f48;
  }
  #county-search:focus {
    border-color: #333f48;
    box-shadow: 0 0 0 3px rgba(51,63,72,0.2);
  }
  #search-result {
    font-size: 15px; min-height: 22px;
    width: 100%; color: #333f48; font-weight: 700;
  }
  #search-result.not-found { color: #c0392b; font-weight: 500; }

  #wrap { position: relative; width: 100%; max-width: 700px; margin: 0 auto; }

  svg#map { width: 100%; height: auto; display: none; }

  .county-path:focus { outline: none; }

  /* Floating hover tooltip (county + region) */
  #tip {
    position: absolute;
    pointer-events: none; opacity: 0;
    background: #fff; border: 2px solid #333f48;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    max-width: 240px; z-index: 100;
    transition: opacity 0.1s;
  }
  #tip .cn { font-size: 15px; font-weight: 700; color: #333f48; margin-bottom: 3px; }
  #tip .rn { font-size: 13px; font-weight: 700; color: #1a4a5a; }


  #sr-announce {
    position: absolute; left: -9999px;
    width: 1px; height: 1px; overflow: hidden;
  }

  #loading { text-align: center; padding: 3rem; font-size: 14px; color: #888; }
</style>
</head>
<body>

<a href="#county-search" id="skip-link">Skip to county search</a>

<div id="search-wrap">
  <label for="county-search">Lookup region by county:</label>
  <input
    id="county-search"
    type="search"
    placeholder="e.g. Travis"
    autocomplete="off"
    aria-label="Search for a Texas county by name"
    aria-describedby="search-result"
  />
  <div id="search-result" role="status" aria-live="polite"></div>
</div>

<span id="map-desc" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">
  An interactive map of Texas showing all 254 counties grouped into DFPS Community-Based Care regions numbered 1, 2, 3E, 3W, 4, 5, 6A, 6B, 7A, 7B, 8A, 8B, 9, 10, 11A, and 11B. Use the search box above or hover over counties to identify your region.
</span>

<div id="wrap" role="region" aria-label="Interactive map of Texas DFPS CBC regions" aria-describedby="map-desc">
  <div id="loading" role="status">Loading map…</div>
  <svg id="map" viewBox="0 0 680 530" role="img" aria-label="Map of Texas counties grouped into DFPS CBC regions.">
    <rect id="map-bg" width="680" height="530" fill="transparent"></rect>
    <g id="counties-layer"></g>
    <g id="borders-layer" style="pointer-events:none;"></g>
    <g id="labels-layer" style="pointer-events:none;"></g>
  </svg>
  <div id="tip" role="tooltip" aria-hidden="true"></div>
  <div id="sr-announce" aria-live="polite" aria-atomic="true"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const REGIONS = [
  { label:"1",   name:"1 – Panhandle",                      sscc:"Saint Francis Ministries",      legacy:false, nudge:[0,0],    fs:20,
    fips:["48011","48017","48045","48065","48069","48075","48079","48087","48107","48111","48117","48125","48129","48153","48169","48179","48189","48191","48195","48205","48211","48219","48233","48269","48279","48295","48303","48305","48341","48345","48357","48359","48369","48375","48381","48393","48421","48437","48445","48483","48501"] },
  { label:"2",   name:"2 – Big Country / Texoma",           sscc:"2INgage",                        legacy:false, nudge:[0,0],    fs:20,
    fips:["48009","48023","48049","48059","48077","48083","48093","48101","48133","48151","48155","48197","48207","48237","48253","48263","48275","48335","48337","48353","48399","48415","48417","48429","48433","48441","48447","48485","48487","48503"] },
  { label:"3E",  name:"3E – Metroplex East",                sscc:"EMPOWER",                        legacy:false, nudge:[0,-4],   fs:20,
    fips:["48085","48113","48139","48147","48181","48231","48257","48349","48397"] },
  { label:"3W",  name:"3W – Metroplex West",                sscc:"Our Community Our Kids (OCOK)",  legacy:false, nudge:[0,8],    fs:20,
    fips:["48097","48121","48143","48221","48251","48363","48367","48425","48439","48497"] },
  { label:"4",   name:"4 – Piney Woods",                    sscc:"4Kids4Families",                 legacy:false, nudge:[0,0],    fs:20,
    fips:["48001","48037","48063","48067","48073","48119","48159","48183","48203","48213","48223","48277","48315","48343","48365","48379","48387","48401","48423","48449","48459","48467","48499"] },
  { label:"5",   name:"5 – Deep East",                      sscc:"Texas Family Care Network",       legacy:false, nudge:[0,0],    fs:20,
    fips:["48005","48199","48225","48241","48245","48347","48351","48361","48373","48403","48405","48407","48419","48455","48457"] },
  { label:"6A",  name:"6A – Harris County",                 sscc:"DePelchin Children's Center",    legacy:false, nudge:[0,0],    fs:14,
    fips:["48201"] },
  { label:"6B",  name:"6B – Bay Area / Montgomery",         sscc:"DePelchin Children's Center",    legacy:false, nudge:[-8,22],  fs:20,
    fips:["48015","48039","48071","48089","48157","48167","48291","48321","48339","48471","48473","48481"] },
  { label:"7A",  name:"7A – Central Texas / Waco",          sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48027","48035","48041","48099","48145","48161","48185","48193","48217","48281","48289","48293","48299","48309","48313","48331","48333","48395","48411","48491"] },
  { label:"7B",  name:"7B – Capital Area",                  sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,10],   fs:20,
    fips:["48021","48031","48051","48053","48055","48149","48209","48287","48453","48477"] },
  { label:"8A",  name:"8A – Bexar County",                  sscc:"SJRC Texas / Belong",            legacy:false, nudge:[0,0],    fs:14,
    fips:["48029"] },
  { label:"8B",  name:"8B – South Central / Hill Country",  sscc:"SJRC Texas / Belong",            legacy:false, nudge:[-30,28], fs:20,
    fips:["48013","48019","48057","48091","48123","48127","48137","48163","48171","48175","48177","48187","48239","48255","48259","48265","48271","48283","48285","48323","48325","48385","48463","48465","48469","48493","48507"] },
  { label:"9",   name:"9 – Permian Basin / Concho",         sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48003","48033","48081","48095","48103","48105","48115","48135","48165","48173","48227","48235","48267","48301","48307","48317","48319","48327","48329","48371","48383","48389","48413","48431","48435","48443","48451","48461","48475","48495"] },
  { label:"10",  name:"10 – El Paso",                       sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48043","48109","48141","48229","48243","48377"] },
  { label:"11A", name:"11A – South Texas / Corpus Christi", sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48007","48025","48047","48131","48249","48261","48273","48297","48311","48355","48391","48409","48479"] },
  { label:"11B", name:"11B – Rio Grande Valley",            sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48061","48215","48247","48427","48489","48505"] },
];

// --- Lookups -------------------------------------------------------------
const fipsToRegion   = {};   // "48001" -> region index
const countyNameToFips = {}; // "anderson" -> "48001"
REGIONS.forEach((r, i) => r.fips.forEach(f => { fipsToRegion[f] = i; }));

const regionOf = d => REGIONS[fipsToRegion[String(d.id)]] || null;
const cap = s => s.replace(/\b\w/g, c => c.toUpperCase());

// --- DOM refs ------------------------------------------------------------
const tip          = document.getElementById("tip");
const wrap         = document.getElementById("wrap");
const srAnnounce   = document.getElementById("sr-announce");
const searchInput  = document.getElementById("county-search");
const resultLine   = document.getElementById("search-result");
const W = 680, H = 530;

let selectedPath = null;
const TOUCH = window.matchMedia("(hover: none)").matches;

// --- Highlight helpers ---------------------------------------------------
function clearHighlights() {
  d3.selectAll(".county-path").attr("fill", "#333f48").attr("fill-opacity", 1);
}

function highlightCounty(pathEl) {
  clearHighlights();
  d3.select(pathEl).attr("fill", "#bf5700").attr("fill-opacity", 1);
}

// Light hover tooltip (desktop): county + region
function showHoverTip(mx, my, countyName, reg) {
  let lx = mx + 14, ly = my - 14;
  if (lx + 245 > W) lx = mx - 250;
  if (ly + 60 > H + 40) ly = my - 60;
  tip.style.left = lx + "px";
  tip.style.top  = ly + "px";
  tip.innerHTML =
    "<div class='cn'>" + countyName + " County</div>" +
    (reg ? "<div class='rn'>Region " + reg.name + "</div>" : "");
  tip.setAttribute("aria-hidden", "false");
  tip.style.opacity = "1";
}

function hideHoverTip() {
  tip.style.opacity = "0";
  tip.setAttribute("aria-hidden", "true");
}

// Shared result line — updated by search, click/tap, and keyboard
function showResult(countyName, reg) {
  resultLine.innerHTML =
    "<strong>" + countyName + " County</strong> &rarr; Region " + reg.name;
  resultLine.className = "";
  srAnnounce.textContent = countyName + " County — Region " + reg.name + ".";
  setTimeout(postHeight, 50);
}

function clearResult() {
  resultLine.textContent = "";
  resultLine.className = "";
  setTimeout(postHeight, 50);
}

// Select a county (used by tap, click, keyboard, and search)
function selectCounty(pathEl, countyName, reg) {
  selectedPath = pathEl;
  highlightCounty(pathEl);
  showResult(countyName, reg);
}

// --- Iframe auto-height --------------------------------------------------
function postHeight() {
  const wrapEl = document.getElementById("wrap");
  // Actual rendered map width (capped at 700px via CSS)
  const mapW = wrapEl ? wrapEl.clientWidth : Math.min(700, window.innerWidth);
  const h = Math.ceil(mapW * (H / W)) + 70; // map height + search/result area
  window.parent.postMessage({ type: "setHeight", height: h }, "*");
}

// --- Build map -----------------------------------------------------------
fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-albers-10m.json")
  .then(r => r.json())
  .then(us => {
    const counties = topojson.feature(us, us.objects.counties);
    const states   = topojson.feature(us, us.objects.states);
    const txFeatures = counties.features.filter(f => String(f.id).startsWith("48"));
    const txState    = states.features.find(f => String(f.id) === "48");

    txFeatures.forEach(f => { countyNameToFips[f.properties.name.toLowerCase()] = String(f.id); });

    // Fit projection to Texas
    const p0 = d3.geoPath();
    const [[x0, y0], [x1, y1]] = p0.bounds({ type: "FeatureCollection", features: txFeatures });
    const scale = Math.min(W / (x1 - x0), H / (y1 - y0)) * 0.95;
    const tx = (W - scale * (x0 + x1)) / 2;
    const ty = (H - scale * (y0 + y1)) / 2;
    const path = d3.geoPath().projection(
      d3.geoTransform({ point(px, py) { this.stream.point(px * scale + tx, py * scale + ty); } })
    );

    // County fills (interactive layer)
    const countyPaths = d3.select("#counties-layer").selectAll("path")
      .data(txFeatures).join("path")
      .attr("class", "county-path")
      .attr("d", path)
      .attr("fill", "#333f48")
      .attr("stroke", "rgba(255,255,255,0.35)")
      .attr("stroke-width", "0.5")
      .attr("cursor", "pointer")
      .attr("tabindex", "0")
      .attr("role", "button")
      .attr("aria-label", d => {
        const reg = regionOf(d);
        return reg ? `${d.properties.name} County — Region ${reg.name}` : `${d.properties.name} County`;
      });

    // Click / tap selects a county (all devices) → updates shared result line
    countyPaths.on("click touchend", function (event, d) {
      event.preventDefault();
      const reg = regionOf(d);
      if (reg) selectCounty(this, d.properties.name, reg);
    });

    // Desktop hover: show county name only, and preview highlight
    if (!TOUCH) {
      countyPaths
        .on("mousemove", function (event, d) {
          if (this !== selectedPath) d3.select(this).attr("fill", "#4b5c68").attr("fill-opacity", 1);
          const [mx, my] = d3.pointer(event, wrap);
          const reg = regionOf(d);
          showHoverTip(mx, my, d.properties.name, reg);
        })
        .on("mouseleave", function () {
          if (this !== selectedPath) d3.select(this).attr("fill", "#333f48").attr("fill-opacity", 1);
          hideHoverTip();
        });
    }

    // Keyboard (all devices): focus previews county name, Enter/Space selects
    countyPaths
      .on("focus", function (event, d) {
        if (this !== selectedPath) d3.select(this).attr("fill", "#4b5c68").attr("fill-opacity", 1);
        const b = this.getBoundingClientRect();
        const r = wrap.getBoundingClientRect();
        showHoverTip(b.left - r.left + b.width / 2, b.top - r.top + b.height / 2, d.properties.name, regionOf(d));
      })
      .on("blur", function () {
        if (this !== selectedPath) d3.select(this).attr("fill", "#333f48").attr("fill-opacity", 1);
        hideHoverTip();
      })
      .on("keydown", function (event, d) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          const reg = regionOf(d);
          if (reg) selectCounty(this, d.properties.name, reg);
        }
      });

    // Reset hover preview when pointer leaves the whole map (desktop),
    // but keep the selected county highlighted
    if (!TOUCH) {
      d3.select("#map").on("mouseleave", function () {
        hideHoverTip();
        d3.selectAll(".county-path").attr("fill", function () {
          return this === selectedPath ? "#bf5700" : "#333f48";
        }).attr("fill-opacity", 1);
      });
    }

    // Thick white region borders
    const regionMesh = topojson.mesh(us, us.objects.counties, (a, b) =>
      String(a.id).startsWith("48") && String(b.id).startsWith("48") &&
      fipsToRegion[String(a.id)] !== fipsToRegion[String(b.id)]
    );
    const borders = d3.select("#borders-layer");
    borders.append("path").datum(regionMesh)
      .attr("d", path).attr("fill", "none")
      .attr("stroke", "#fff").attr("stroke-width", "3")
      .attr("stroke-linejoin", "round").attr("stroke-linecap", "round");
    borders.append("path").datum(txState)
      .attr("d", path).attr("fill", "none")
      .attr("stroke", "#fff").attr("stroke-width", "3")
      .attr("stroke-linejoin", "round");

    // Region number labels (area-weighted centroid + manual nudge)
    const labels = d3.select("#labels-layer");
    REGIONS.forEach(reg => {
      const fipsSet = new Set(reg.fips);
      const feats = txFeatures.filter(f => fipsSet.has(String(f.id)));
      if (!feats.length) return;
      let area = 0, cx = 0, cy = 0;
      feats.forEach(f => {
        const a = path.area(f), c = path.centroid(f);
        if (!isNaN(c[0]) && !isNaN(c[1])) { cx += c[0] * a; cy += c[1] * a; area += a; }
      });
      if (!area) return;
      labels.append("text")
        .attr("x", cx / area + reg.nudge[0])
        .attr("y", cy / area + reg.nudge[1])
        .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
        .attr("font-family", "Arial, sans-serif")
        .attr("font-size", reg.fs).attr("font-weight", "700")
        .attr("fill", "#97D5DC").attr("aria-hidden", "true")
        .text(reg.label);
    });

    // Reveal map, report height
    document.getElementById("loading").style.display = "none";
    document.getElementById("map").style.display = "block";
    requestAnimationFrame(() => setTimeout(postHeight, 200));
    window.addEventListener("resize", postHeight);

    // Search — highlights the matching county and shows its region
    searchInput.addEventListener("input", function () {
      const val = this.value.trim().toLowerCase().replace(/\s*county\s*$/i, "");
      clearHighlights();
      hideHoverTip();
      selectedPath = null;
      if (!val) { clearResult(); return; }

      const fips = countyNameToFips[val];
      if (fips) {
        const reg = REGIONS[fipsToRegion[fips]];
        // Select that county so search and map agree
        const pathEl = countyPaths.filter(d => String(d.id) === fips).node();
        if (pathEl) selectCounty(pathEl, cap(val), reg);
      } else {
        const matches = Object.keys(countyNameToFips).filter(c => c.startsWith(val)).slice(0, 4);
        if (matches.length) {
          resultLine.textContent = "Did you mean: " + matches.map(cap).join(", ") + "?";
          resultLine.className = "";
        } else {
          resultLine.textContent = "County not found. Try without \"County\".";
          resultLine.className = "not-found";
        }
        setTimeout(postHeight, 50);
      }
    });

    searchInput.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        this.value = "";
        clearHighlights();
        hideHoverTip();
        selectedPath = null;
        clearResult();
      }
    });
  });
</script>
</body>
</html>
