<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Texas DFPS CBC Region Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #fff;
    padding: 0;
    margin: 0;
  }

  #skip-link {
    position: absolute; top: -999px; left: -999px;
    background: #333f48; color: #fff;
    padding: 8px 14px; font-size: 14px;
    border-radius: 4px; z-index: 100;
    text-decoration: none;
  }
  #skip-link:focus { top: 8px; left: 8px; }

  #map-description {
    font-size: 14px; color: #333f48;
    margin-bottom: 10px; line-height: 1.5;
  }

  #search-wrap {
    margin-bottom: 10px;
    display: flex; flex-wrap: wrap;
    align-items: center; gap: 8px;
  }
  #search-wrap label {
    font-size: 14px; font-weight: 600; color: #333f48;
  }
  #county-search {
    font-size: 14px; padding: 6px 10px;
    border: 2px solid #aaa; border-radius: 6px;
    outline: none; width: 220px; max-width: 100%; color: #333f48;
  }
  #county-search:focus {
    border-color: #333f48;
    box-shadow: 0 0 0 3px rgba(51,63,72,0.2);
  }
  #search-result {
    font-size: 13px; min-height: 20px;
    width: 100%; color: #333f48; font-weight: 500;
  }
  #search-result.not-found { color: #c0392b; }

  #wrap {
    position: relative;
    width: 100%;
  }

  svg#map {
    width: 100%;
    height: auto;
    display: none;
  }

  .county-path:focus {
    outline: none;
  }

  /* Tooltip — fixed to bottom on mobile, floating on desktop */
  #tip {
    position: absolute;
    pointer-events: none; opacity: 0;
    background: #fff; border: 2px solid #333f48;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    max-width: 240px; z-index: 20;
    transition: opacity 0.1s;
  }
  #tip .cn { font-size: 15px; font-weight: 700; color: #333f48; margin-bottom: 3px; }
  #tip .rn { font-size: 13px; font-weight: 700; color: #1a4a5a; margin-bottom: 2px; }
  #tip .ss { font-size: 12px; color: #444; }

  @media (max-width: 480px) {
    #tip {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      top: auto; max-width: 90vw; width: 90vw;
    }
  }

  #sr-announce {
    position: absolute; left: -9999px;
    width: 1px; height: 1px; overflow: hidden;
  }

  #loading { text-align: center; padding: 3rem; font-size: 14px; color: #888; }
</style>
</head>
<body>

<a href="#county-search" id="skip-link">Skip to county search</a>

<p id="map-description">
  Hover over or tap any county to see which region it belongs to.
</p>

<div id="search-wrap">
  <label for="county-search">Enter county:</label>
  <input
    id="county-search"
    type="search"
    placeholder="e.g. Travis"
    autocomplete="off"
    aria-label="Search for a Texas county by name"
    aria-describedby="search-result"
  />
  <div id="search-result" role="status" aria-live="polite"></div>
</div>

<div id="wrap" role="region" aria-label="Interactive map of Texas DFPS CBC regions">
  <div id="loading" role="status">Loading map…</div>
  <svg
    id="map"
    viewBox="0 0 680 530"
    role="img"
    aria-label="Map of Texas counties grouped into DFPS CBC regions."
  >
    <title>Texas DFPS CBC Region Map</title>
    <desc>An interactive map of Texas showing all 254 counties grouped into DFPS Community-Based Care regions numbered 1, 2, 3E, 3W, 4, 5, 6A, 6B, 7A, 7B, 8A, 8B, 9, 10, 11A, and 11B.</desc>
    <g id="counties-layer"></g>
    <g id="borders-layer" style="pointer-events:none;"></g>
    <g id="labels-layer" style="pointer-events:none;"></g>
  </svg>
  <div id="tip" role="tooltip" aria-hidden="true"></div>
  <div id="sr-announce" aria-live="polite" aria-atomic="true"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const REGIONS = [
  { label:"1",   name:"1 – Panhandle",                      sscc:"Saint Francis Ministries",      legacy:false, nudge:[0,0],    fs:20,
    fips:["48011","48017","48045","48065","48069","48075","48079","48087","48107","48111","48117","48125","48129","48153","48169","48179","48189","48191","48195","48205","48211","48219","48233","48269","48279","48295","48303","48305","48341","48345","48357","48359","48369","48375","48381","48393","48421","48437","48445","48483","48501"] },
  { label:"2",   name:"2 – Big Country / Texoma",           sscc:"2INgage",                        legacy:false, nudge:[0,0],    fs:20,
    fips:["48009","48023","48049","48059","48077","48083","48093","48101","48133","48151","48155","48197","48207","48237","48253","48263","48275","48335","48337","48353","48399","48415","48417","48429","48433","48441","48447","48485","48487","48503"] },
  { label:"3E",  name:"3E – Metroplex East",                sscc:"EMPOWER",                        legacy:false, nudge:[0,-4],   fs:20,
    fips:["48085","48113","48139","48147","48181","48231","48257","48349","48397"] },
  { label:"3W",  name:"3W – Metroplex West",                sscc:"Our Community Our Kids (OCOK)",  legacy:false, nudge:[0,8],    fs:20,
    fips:["48097","48121","48143","48221","48251","48363","48367","48425","48439","48497"] },
  { label:"4",   name:"4 – Piney Woods",                    sscc:"4Kids4Families",                 legacy:false, nudge:[0,0],    fs:20,
    fips:["48001","48037","48063","48067","48073","48119","48159","48183","48203","48213","48223","48277","48315","48343","48365","48379","48387","48401","48423","48449","48459","48467","48499"] },
  { label:"5",   name:"5 – Deep East",                      sscc:"Texas Family Care Network",       legacy:false, nudge:[0,0],    fs:20,
    fips:["48005","48199","48225","48241","48245","48347","48351","48361","48373","48403","48405","48407","48419","48455","48457"] },
  { label:"6A",  name:"6A – Harris County",                 sscc:"DePelchin Children's Center",    legacy:false, nudge:[0,0],    fs:14,
    fips:["48201"] },
  { label:"6B",  name:"6B – Bay Area / Montgomery",         sscc:"DePelchin Children's Center",    legacy:false, nudge:[-8,22],  fs:20,
    fips:["48015","48039","48071","48089","48157","48167","48291","48321","48339","48471","48473","48481"] },
  { label:"7A",  name:"7A – Central Texas / Waco",          sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48027","48035","48041","48099","48145","48161","48185","48193","48217","48281","48289","48293","48299","48309","48313","48331","48333","48395","48411","48491"] },
  { label:"7B",  name:"7B – Capital Area",                  sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,10],   fs:20,
    fips:["48021","48031","48051","48053","48055","48149","48209","48287","48453","48477"] },
  { label:"8A",  name:"8A – Bexar County",                  sscc:"SJRC Texas / Belong",            legacy:false, nudge:[0,0],    fs:14,
    fips:["48029"] },
  { label:"8B",  name:"8B – South Central / Hill Country",  sscc:"SJRC Texas / Belong",            legacy:false, nudge:[-30,28], fs:20,
    fips:["48013","48019","48057","48091","48123","48127","48137","48163","48171","48175","48177","48187","48239","48255","48259","48265","48271","48283","48285","48323","48325","48385","48463","48465","48469","48493","48507"] },
  { label:"9",   name:"9 – Permian Basin / Concho",         sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48003","48033","48081","48095","48103","48105","48115","48135","48165","48173","48227","48235","48267","48301","48307","48317","48319","48327","48329","48371","48383","48389","48413","48431","48435","48443","48451","48461","48475","48495"] },
  { label:"10",  name:"10 – El Paso",                       sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48043","48109","48141","48229","48243","48377"] },
  { label:"11A", name:"11A – South Texas / Corpus Christi", sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48007","48025","48047","48131","48249","48261","48273","48297","48311","48355","48391","48409","48479"] },
  { label:"11B", name:"11B – Rio Grande Valley",            sscc:"DFPS Legacy Area",               legacy:true,  nudge:[0,0],    fs:20,
    fips:["48061","48215","48247","48427","48489","48505"] },
];

const fipsToRegion = {};
const countyNameToFips = {};
REGIONS.forEach((r, i) => r.fips.forEach(f => { fipsToRegion[f] = i; }));

const tip        = document.getElementById("tip");
const wrap       = document.getElementById("wrap");
const srAnnounce = document.getElementById("sr-announce");
const searchInput  = document.getElementById("county-search");
const searchResult = document.getElementById("search-result");
const countiesLayer = d3.select("#counties-layer");
const bordersLayer  = d3.select("#borders-layer");
const labelsLayer   = d3.select("#labels-layer");
const W = 680, H = 530;

// Post height to parent so Qualtrics iframe can resize
function postHeight() {
  const mapEl = document.getElementById("map");
  const svgWidth = mapEl ? mapEl.getBoundingClientRect().width : window.innerWidth;
  // SVG viewBox is 680x530 — maintain aspect ratio
  const mapHeight = svgWidth * (530 / 680);
  // Add height of anything above the map (description + search bar)
  const wrapTop = document.getElementById("wrap").getBoundingClientRect().top;
  const total = Math.ceil(wrapTop + mapHeight + 20);
  window.parent.postMessage({ type: "setHeight", height: total }, "*");
}

function showTip(mx, my, countyName, reg) {
  const sub = reg.legacy ? "DFPS Legacy Area" : "SSCC: " + reg.sscc;
  tip.innerHTML = `<div class="cn">${countyName} County</div><div class="rn">Region ${reg.name}</div><div class="ss">${sub}</div>`;
  tip.setAttribute("aria-hidden", "false");
  if (window.innerWidth > 480) {
    let lx = mx + 14, ly = my - 14;
    if (lx + 245 > W) lx = mx - 250;
    if (ly + 105 > H + 40) ly = my - 105;
    tip.style.left = lx + "px";
    tip.style.top  = ly + "px";
  }
  tip.style.opacity = "1";
  srAnnounce.textContent = `${countyName} County — Region ${reg.name}. ${sub}.`;
}

function hideTip() {
  tip.style.opacity = "0";
  tip.setAttribute("aria-hidden", "true");
}

fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-albers-10m.json")
  .then(r => r.json())
  .then(us => {
    const allCounties = topojson.feature(us, us.objects.counties);
    const allStates   = topojson.feature(us, us.objects.states);
    const txFeatures  = allCounties.features.filter(f => String(f.id).startsWith("48"));
    const txCounties  = { type: "FeatureCollection", features: txFeatures };
    const txState     = allStates.features.find(f => String(f.id) === "48");

    txFeatures.forEach(f => {
      countyNameToFips[f.properties.name.toLowerCase()] = String(f.id);
    });

    const path0 = d3.geoPath();
    const [[x0, y0], [x1, y1]] = path0.bounds(txCounties);
    const scale = Math.min(W / (x1 - x0), H / (y1 - y0)) * 0.95;
    const tx = (W - scale * (x0 + x1)) / 2;
    const ty = (H - scale * (y0 + y1)) / 2;
    const proj = d3.geoTransform({
      point(px, py) { this.stream.point(px * scale + tx, py * scale + ty); }
    });
    const path = d3.geoPath().projection(proj);

    countiesLayer.selectAll("path")
      .data(txFeatures).join("path")
      .attr("class", "county-path")
      .attr("d", path)
      .attr("fill", "#333f48")
      .attr("stroke", "rgba(255,255,255,0.35)")
      .attr("stroke-width", "0.5")
      .attr("cursor", "pointer")
      .attr("tabindex", "0")
      .attr("role", "button")
      .attr("aria-label", d => {
        const ri = fipsToRegion[String(d.id)];
        const reg = ri !== undefined ? REGIONS[ri] : null;
        return reg ? `${d.properties.name} County — Region ${reg.name}` : `${d.properties.name} County`;
      })
      .on("mousemove", function(event, d) {
        const ri = fipsToRegion[String(d.id)];
        const reg = ri !== undefined ? REGIONS[ri] : null;
        d3.select(this).attr("fill", "#4f5f6e");
        if (!reg) return;
        const [mx, my] = d3.pointer(event, wrap);
        showTip(mx, my, d.properties.name, reg);
      })
      .on("mouseleave", function() {
        d3.select(this).attr("fill", "#333f48");
        hideTip();
      })
      .on("touchstart", function(event, d) {
        event.preventDefault();
        const ri = fipsToRegion[String(d.id)];
        const reg = ri !== undefined ? REGIONS[ri] : null;
        d3.selectAll(".county-path").attr("fill", "#333f48");
        d3.select(this).attr("fill", "#4f5f6e");
        if (!reg) return;
        const touch = event.touches[0];
        const wrapRect = wrap.getBoundingClientRect();
        showTip(touch.clientX - wrapRect.left, touch.clientY - wrapRect.top, d.properties.name, reg);
      })
      .on("focus", function(event, d) {
        const ri = fipsToRegion[String(d.id)];
        const reg = ri !== undefined ? REGIONS[ri] : null;
        d3.select(this).attr("fill", "#4f5f6e");
        if (!reg) return;
        const bbox = this.getBoundingClientRect();
        const wrapRect = wrap.getBoundingClientRect();
        showTip(bbox.left - wrapRect.left + bbox.width / 2, bbox.top - wrapRect.top + bbox.height / 2, d.properties.name, reg);
      })
      .on("blur", function() {
        d3.select(this).attr("fill", "#333f48");
        hideTip();
      })
      .on("keydown", function(event, d) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          this.dispatchEvent(new Event("focus"));
        }
      });

    const regionMesh = topojson.mesh(us, us.objects.counties, (a, b) => {
      if (!String(a.id).startsWith("48") || !String(b.id).startsWith("48")) return false;
      return fipsToRegion[String(a.id)] !== fipsToRegion[String(b.id)];
    });

    bordersLayer.append("path")
      .datum(regionMesh)
      .attr("d", path).attr("fill", "none")
      .attr("stroke", "#ffffff").attr("stroke-width", "3")
      .attr("stroke-linejoin", "round").attr("stroke-linecap", "round");

    bordersLayer.append("path")
      .datum(txState)
      .attr("d", path).attr("fill", "none")
      .attr("stroke", "#ffffff").attr("stroke-width", "3")
      .attr("stroke-linejoin", "round");

    REGIONS.forEach(reg => {
      const fipsSet = new Set(reg.fips);
      const regionFeatures = txFeatures.filter(f => fipsSet.has(String(f.id)));
      if (!regionFeatures.length) return;

      let totalArea = 0, cx = 0, cy = 0;
      regionFeatures.forEach(f => {
        const a = path.area(f);
        const c = path.centroid(f);
        if (!isNaN(c[0]) && !isNaN(c[1])) { cx += c[0] * a; cy += c[1] * a; totalArea += a; }
      });
      if (totalArea === 0) return;
      cx = cx / totalArea + reg.nudge[0];
      cy = cy / totalArea + reg.nudge[1];

      labelsLayer.append("text")
        .attr("x", cx).attr("y", cy)
        .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
        .attr("font-family", "Arial, sans-serif")
        .attr("font-size", reg.fs).attr("font-weight", "700")
        .attr("fill", "#97D5DC").attr("aria-hidden", "true")
        .text(reg.label);
    });

    document.getElementById("loading").style.display = "none";
    const mapEl = document.getElementById("map");
    mapEl.style.display = "block";

    // Send height to parent iframe after map renders
    setTimeout(postHeight, 100);
    window.addEventListener("resize", postHeight);

    searchInput.addEventListener("input", function() {
      const val = this.value.trim().toLowerCase().replace(/\s*county\s*$/i, "");
      searchResult.textContent = "";
      searchResult.className = "";
      d3.selectAll(".county-path").attr("fill", "#333f48").attr("opacity", 1);
      hideTip();
      if (!val) return;
      const fips = countyNameToFips[val];
      if (fips) {
        const ri = fipsToRegion[fips];
        const reg = ri !== undefined ? REGIONS[ri] : null;
        if (reg) {
          const sub = reg.legacy ? "DFPS Legacy Area" : "SSCC: " + reg.sscc;
          searchResult.textContent = `${val.replace(/\b\w/g, c => c.toUpperCase())} County → Region ${reg.name} (${sub})`;
          d3.selectAll(".county-path")
            .attr("opacity", d => fipsToRegion[String(d.id)] === ri ? 1 : 0.3)
            .attr("fill", d => fipsToRegion[String(d.id)] === ri ? "#4f5f6e" : "#333f48");
        }
      } else {
        const matches = Object.keys(countyNameToFips).filter(c => c.startsWith(val)).slice(0, 4);
        if (matches.length) {
          searchResult.textContent = `Did you mean: ${matches.map(m => m.replace(/\b\w/g, c => c.toUpperCase())).join(", ")}?`;
        } else {
          searchResult.textContent = "County not found. Try without \"County\".";
          searchResult.className = "not-found";
        }
      }
      setTimeout(postHeight, 50);
    });

    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        this.value = "";
        searchResult.textContent = "";
        d3.selectAll(".county-path").attr("fill", "#333f48").attr("opacity", 1);
        hideTip();
      }
    });
  });
</script>
</body>
</html>
